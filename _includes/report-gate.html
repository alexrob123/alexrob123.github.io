<div id="report-gate" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;max-width:380px;width:90%;padding:2rem;border:1px solid #ddd;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,0.10);">
    <h2 style="margin-top:0;font-size:1.4rem;">Protected Access</h2>
    <p style="color:#666;font-size:0.95rem;">This section is private. Enter the password to continue.</p>
    <input
      id="report-gate-input"
      type="password"
      placeholder="Password"
      autocomplete="current-password"
      style="width:100%;padding:0.5rem 0.75rem;margin-bottom:0.75rem;border:1px solid #ccc;border-radius:4px;font-size:1rem;box-sizing:border-box;"
    />
    <button
      onclick="checkReportPassword()"
      style="width:100%;padding:0.6rem;background:#494e52;color:#fff;border:none;border-radius:4px;font-size:1rem;cursor:pointer;"
    >Enter</button>
    <p id="report-gate-error" style="color:#c0392b;margin-top:0.75rem;font-size:0.9rem;display:none;">
      Incorrect password. Please try again.
    </p>
  </div>
</div>
<script>
(function () {
  var HASH = '971b79e4f39fa0a0d673b7f8ff6d247f49c5779cf68b0fcfa2d286b2963971f0';
  var KEY  = 'report_auth_v1';

  // Hide immediately if session already authenticated (prevents flash)
  if (sessionStorage.getItem(KEY) === '1') {
    document.getElementById('report-gate').style.display = 'none';
  }

  async function sha256(str) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf))
      .map(function (b) { return b.toString(16).padStart(2, '0'); })
      .join('');
  }

  window.checkReportPassword = async function () {
    var input = document.getElementById('report-gate-input').value;
    var hash  = await sha256(input);
    if (hash === HASH) {
      sessionStorage.setItem(KEY, '1');
      document.getElementById('report-gate').style.display = 'none';
    } else {
      document.getElementById('report-gate-error').style.display = 'block';
    }
  };

  document.addEventListener('DOMContentLoaded', function () {
    var input = document.getElementById('report-gate-input');
    if (input) {
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') window.checkReportPassword();
      });
    }
  });
})();
</script>
